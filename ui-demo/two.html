<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Koshur Scientist Login</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Particles.js library -->
  <script src="https://cdn.jsdelivr.net/npm/particles.js@2.0.0/particles.min.js"></script>
</head>

<body class="relative bg-black text-white min-h-screen flex items-center justify-center">

  <!-- PARTICLES BACKGROUND -->
  <div id="particles-js" class="absolute inset-0 -z-10"></div>

  <!-- LOGIN CARD -->
  <div class="bg-zinc-900/70 border border-zinc-700 rounded-2xl shadow-xl backdrop-blur-sm p-10 w-full max-w-md">

    <!-- Brand Title -->
    <h1 class="text-center text-4xl font-extrabold text-yellow-400 drop-shadow-lg">
      Koshur Scientist
    </h1>
    <p class="text-center text-gray-300 mb-8">
      Welcome Back — Log In
    </p>

    <!-- FORM -->
    <form class="space-y-5">
      <input
        type="text"
        placeholder="Email or Phone"
        class="w-full px-4 py-3 rounded-lg bg-black border border-zinc-700 focus:border-yellow-400 focus:ring-2 focus:ring-yellow-400/30 outline-none"
      />

      <input
        type="password"
        placeholder="Password"
        class="w-full px-4 py-3 rounded-lg bg-black border border-zinc-700 focus:border-yellow-400 focus:ring-2 focus:ring-yellow-400/30 outline-none"
      />

      <button
        type="submit"
        class="w-full py-3 rounded-lg bg-yellow-400 text-black font-semibold hover:bg-yellow-300 transition transform hover:scale-105"
      >
        Log In
      </button>
    </form>

    <!-- OR DIVIDER -->
    <div class="flex items-center my-5 gap-2">
      <div class="flex-grow h-px bg-zinc-600"></div>
      <span class="text-gray-400 text-sm">OR</span>
      <div class="flex-grow h-px bg-zinc-600"></div>
    </div>

    <!-- GOOGLE LOGIN -->
    <button
      class="w-full py-3 rounded-lg border border-zinc-700 hover:border-yellow-400 flex items-center justify-center gap-2 transition"
    >
      <img src="https://www.svgrepo.com/show/475656/google-color.svg" class="w-5 h-5" />
      <span class="text-gray-200">Continue with Google</span>
    </button>
  </div>

  <!-- PARTICLES CONFIG -->
  <script>
    particlesJS("particles-js", {
      "particles": {
        "number": { "value": 80, "density": { "enable": true, "value_area": 800 } },
        "color": { "value": "#FFD700" },
        "shape": {
          "type": "circle",
          "stroke": { "width": 0, "color": "#000" }
        },
        "opacity": { "value": 0.6 },
        "size": { "value": 3, "random": true },
        "line_linked": { "enable": true, "distance": 150, "color": "#FFD700", "opacity": 0.25, "width": 1 },
        "move": { "enable": true, "speed": 3, "direction": "none", "random": false, "straight": false }
      },
      "interactivity": {
        "detect_on": "canvas",
        "events": {
          "onhover": { "enable": true, "mode": "repulse" },
          "onclick": { "enable": true, "mode": "push" },
          "resize": true
        },
        "modes": {
          "repulse": { "distance": 100 },
          "push": { "particles_nb": 4 }
        }
      },
      "retina_detect": true
    });
  </script>

</body>
</html>
