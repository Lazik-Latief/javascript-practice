<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Koshur Scientist – Login</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-black text-white min-h-screen flex">

  <!-- LEFT SECTION -->
  <div class="hidden lg:flex w-1/2 relative items-center justify-center bg-gradient-to-br from-black via-zinc-900 to-black">
    
    <!-- Glow -->
    <div class="absolute inset-0 bg-yellow-400/10 blur-3xl"></div>

    <div class="relative z-10 text-center px-12">
      <h1 class="text-5xl font-extrabold tracking-wide text-yellow-400">
        Koshur Scientist
      </h1>
      <p class="mt-4 text-gray-300 text-lg">
        Learn. Build. Dominate the Future.
      </p>

      <div class="mt-10 border border-yellow-400/30 rounded-xl p-6 text-left backdrop-blur-sm">
        <p class="text-sm text-gray-300">
          ⚡ EdTech powered by innovation  
          <br />🎮 Learning with a gamer mindset  
          <br />🚀 Skills for real-world dominance
        </p>
      </div>
    </div>
  </div>

  <!-- RIGHT SECTION -->
  <div class="w-full lg:w-1/2 flex items-center justify-center px-6">
    <div class="w-full max-w-md bg-zinc-900/80 border border-zinc-800 rounded-2xl p-8 shadow-2xl">

      <h2 class="text-3xl font-bold text-yellow-400 mb-2">
        Welcome Back
      </h2>
      <p class="text-gray-400 mb-8">
        Login to continue your journey
      </p>

      <!-- INPUT -->
      <div class="space-y-5">
        <input
          type="text"
          placeholder="Email or Phone Number"
          class="w-full px-4 py-3 rounded-lg bg-black border border-zinc-700 focus:border-yellow-400 focus:ring-2 focus:ring-yellow-400/30 outline-none transition"
        />

        <input
          type="password"
          placeholder="Password"
          class="w-full px-4 py-3 rounded-lg bg-black border border-zinc-700 focus:border-yellow-400 focus:ring-2 focus:ring-yellow-400/30 outline-none transition"
        />
      </div>

      <!-- LOGIN BUTTON -->
      <button
        class="mt-6 w-full py-3 rounded-lg bg-yellow-400 text-black font-semibold tracking-wide hover:bg-yellow-300 transition transform hover:scale-[1.02]"
      >
        Login
      </button>

      <!-- DIVIDER -->
      <div class="flex items-center my-6">
        <div class="flex-grow h-px bg-zinc-700"></div>
        <span class="px-4 text-sm text-gray-400">OR</span>
        <div class="flex-grow h-px bg-zinc-700"></div>
      </div>

      <!-- GOOGLE -->
      <button
        class="w-full py-3 rounded-lg border border-zinc-700 hover:border-yellow-400 flex items-center justify-center gap-3 transition"
      >
        <img src="https://www.svgrepo.com/show/475656/google-color.svg" class="w-5 h-5" />
        <span class="text-gray-200">Continue with Google</span>
      </button>

      <!-- FOOTER -->
      <p class="text-center text-sm text-gray-500 mt-6">
        © 2026 Koshur Scientist
      </p>
    </div>
  </div>

</body>
</html>
