<!DOCTYPE html>
<html>
<head>
  <title>Async Await Example</title>
</head>
<body>

  <h2>Posts (Using async/await)</h2>
  <button id="loadBtn">Load Posts</button>
  <div id="output"></div>

  <script>
    const button = document.getElementById("loadBtn");
    const output = document.getElementById("output");

    // Async function automatically returns a Promise
    async function fetchPosts() {
      try {

        // Wait until fetch completes
        const response = await fetch(
          "https://jsonplaceholder.typicode.com/posts?_limit=5"
        );

        // Wait until JSON conversion completes
        const data = await response.json();

        output.innerHTML = "";

        data.forEach(post => {
          const div = document.createElement("div");
          div.innerHTML = `
            <h4>${post.title}</h4>
            <p>${post.body}</p>
            <hr/>
          `;
          output.appendChild(div);
        });

      } catch (error) {
        console.log("Error:", error);
        output.innerHTML = "<p>Something went wrong!</p>";
      }
    }

    button.addEventListener("click", fetchPosts);
  </script>

</body>
</html>
