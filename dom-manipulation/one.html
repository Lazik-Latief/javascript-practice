<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    
    <title>DOM learning</title>
    <style>
        .bg-black{
            background-color: #212121;
            color: #fff;
        }
    </style>
</head>
<body class="bg-black">
    <!-- Main container -->
<div>
    <!-- h1 with id, class, and hidden span to test innerText vs textContent -->
    <h1 id="title" class="heading">
        DOM learning on Chai aur code
        <span style="display: none;">test text</span>
    </h1>

    <!-- Multiple elements to practice getElementsByTagName -->
    <h2>Lorem ipsum dolor sit.</h2>
    <h2>Lorem ipsum dolor sit.</h2>
    <h2>Lorem ipsum dolor sit.</h2>

    <!-- Paragraph for text selection -->
    <p>Lorem ipsum dolor sit amet.</p>

    <!-- Input field to test input selection -->
    <input type="password">

    <!-- List items for querySelectorAll practice -->
    <ul>
        <li class="list-item">one</li>
        <li class="list-item">two</li>
        <li class="list-item">three</li>
        <li class="list-item">four</li>
    </ul>
</div>

</body>
</html>
