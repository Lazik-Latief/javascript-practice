<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>JavaScript API Practice</title>

  <!-- Simple Modern UI Styling -->
  <style>
    body{
      font-family: Arial, Helvetica, sans-serif;
      background:#0f172a;
      color:white;
      margin:0;
      padding:40px;
    }

    h1{
      text-align:center;
      margin-bottom:30px;
    }

    .container{
      max-width:900px;
      margin:auto;
    }

    .card{
      background:#1e293b;
      padding:20px;
      border-radius:10px;
      margin-bottom:20px;
      box-shadow:0 5px 15px rgba(0,0,0,0.4);
    }

    button{
      background:#22c55e;
      border:none;
      padding:10px 16px;
      border-radius:6px;
      color:white;
      cursor:pointer;
      margin-top:10px;
    }

    button:hover{
      background:#16a34a;
    }

    .output{
      margin-top:15px;
      padding:10px;
      background:#020617;
      border-radius:6px;
      min-height:40px;
    }

    .user{
      padding:8px;
      border-bottom:1px solid #334155;
    }

    .post{
      margin-bottom:10px;
    }
  </style>
</head>

<body>

<div class="container">

<h1>JS API Practice (Fetch + Async/Await)</h1>

<!-- ================================================= -->
<!-- Example 1 : Basic Fetch Request -->
<!-- ================================================= -->

<div class="card">

<h2>Example 1 : Basic Fetch Request</h2>

<p>
Click the button to fetch a random joke from a public API.
</p>

<button onclick="getJoke()">Get Joke</button>

<div id="jokeOutput" class="output"></div>

</div>



<!-- ================================================= -->
<!-- Example 2 : Async / Await with API -->
<!-- ================================================= -->

<div class="card">

<h2>Example 2 : Async Await API Call</h2>

<p>
Fetch a random user using async / await.
</p>

<button onclick="getUser()">Get Random User</button>

<div id="userOutput" class="output"></div>

</div>



<!-- ================================================= -->
<!-- Example 3 : Fetch Multiple Data (Posts) -->
<!-- ================================================= -->

<div class="card">

<h2>Example 3 : Fetch Multiple Posts</h2>

<p>
Load posts from an API and display them on the page.
</p>

<button onclick="loadPosts()">Load Posts</button>

<div id="postsOutput" class="output"></div>

</div>


</div>


<script>

/* =========================================================
Example 1 : Basic Fetch
Fetch a random joke from API
========================================================= */

function getJoke(){

  // API endpoint
  const url = "https://official-joke-api.appspot.com/random_joke"

  fetch(url)

  // convert response to JSON
  .then(response => response.json())

  // handle the data
  .then(data => {

    const joke = data.setup + " - " + data.punchline

    document.getElementById("jokeOutput").innerText = joke

  })

  // error handling
  .catch(error => {

    document.getElementById("jokeOutput").innerText =
    "Error loading joke"

    console.log(error)

  })

}



/* =========================================================
Example 2 : Async / Await
Fetch random user
========================================================= */

async function getUser(){

  const output = document.getElementById("userOutput")

  // show loading text
  output.innerText = "Loading user..."

  try{

    const response = await fetch("https://randomuser.me/api/")

    const data = await response.json()

    const user = data.results[0]

    // display user nicely
    output.innerHTML = `
      <div class="user">
      <strong>Name:</strong> ${user.name.first} ${user.name.last}
      </div>

      <div class="user">
      <strong>Email:</strong> ${user.email}
      </div>

      <div class="user">
      <strong>Country:</strong> ${user.location.country}
      </div>
    `

  }

  catch(error){

    output.innerText = "Error fetching user"

  }

}



/* =========================================================
Example 3 : Fetch List Data
Load multiple posts
========================================================= */

async function loadPosts(){

  const output = document.getElementById("postsOutput")

  output.innerText = "Loading posts..."

  try{

    const response = await fetch(
      "https://jsonplaceholder.typicode.com/posts?_limit=5"
    )

    const posts = await response.json()

    // clear output
    output.innerHTML = ""

    posts.forEach(post => {

      const div = document.createElement("div")

      div.className = "post"

      div.innerHTML = `
        <strong>${post.title}</strong>
        <p>${post.body}</p>
      `

      output.appendChild(div)

    })

  }

  catch(error){

    output.innerText = "Failed to load posts"

  }

}

</script>

</body>
</html>
