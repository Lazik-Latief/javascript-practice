      /* =====================================================
         ASYNC / AWAIT
         -----------------------------------------------------
         - Cleaner syntax over .then()
         - await pauses execution until promise resolves
      ===================================================== */

      function getData(dataId){
        return new Promise((resolve)=>{
          setTimeout(()=>{
            console.log("data", dataId);
            resolve("success");
          }, 2000);
        });
      }

      async function getAllData(){
        console.log("getting data1...");
        await getData(1);

        console.log("getting data2...");
        await getData(2);

        console.log("getting data3...");
        await getData(3);

        console.log("getting data4...");
        await getData(4);
      }

      /* =====================================================
         IIFE (Immediately Invoked Function Expression)
         -----------------------------------------------------
         Used to run async code immediately
         without calling the function manually
      ===================================================== */

      (
        async function(){
          console.log("getting data1...");
          await getData(1);
          console.log("getting data2...");
          await getData(2);
          console.log("getting data3...");
          await getData(3);
          console.log("getting data4...");
          await getData(4);
        }
      )();

      /* =====================================================
         ARROW FUNCTION IIFE (Modern Style)
         -----------------------------------------------------
         Shortest and cleanest async execution pattern
      ===================================================== */

      (async ()=>{
        console.log("getting data1...");
        await getData(1);
        console.log("getting data2...");
        await getData(2);
        console.log("getting data3...");
        await getData(3);
        console.log("getting data4...");
        await getData(4);
      })();
