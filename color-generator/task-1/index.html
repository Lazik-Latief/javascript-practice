<!DOCTYPE html>
<!-- Tells the browser that this document is HTML5 -->
<html lang="en">
<head>
  <!-- Character encoding (supports most languages & symbols) -->
  <meta charset="UTF-8">

  <!-- Makes the site responsive on mobile devices -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Page title shown in browser tab -->
  <title>Color Generator</title>

  <!-- Linking external CSS file -->
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Main container -->
  <div>
    <!-- Page heading -->
    <h1>Color Generator</h1>

    <!-- Ordered list where colors will be added dynamically using JavaScript -->
    <ol id="colorList">
      <!-- JS will inject <li> items here -->
    </ol>
  </div>

  <!-- Linking external JavaScript file -->
  <script src="script.js"></script>
</body>
</html>
