<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!-- Makes page responsive on all devices -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Async-Await</title>
  </head>

  <body
    style="background-color: blueviolet; display: flex; justify-content: center"
  >
    <h1>Chai aur Async-Await</h1>

    <script>
      // ==================================================
      // PROMISE 5: Creating a Promise manually
      // ==================================================
      // This promise simulates an async task using setTimeout
      // resolve → success
      // reject → failure

      const promiseFive = new Promise(function (resolve, reject) {
        setTimeout(() => {
          // Toggle this value to simulate success or error
          let error = false;

          if (!error) {
            // Promise resolved with an object
            resolve({ username: "JavaScript", price: "999" });
            console.log("5th promise resolved after 5 seconds");
          } else {
            // Promise rejected with an error message
            reject("Error: JS went wrong");
          }
        }, 5000);
      });

      // ==================================================
      // CONSUMING PROMISE using async / await
      // ==================================================
      // async keyword allows usage of await inside function
      // await pauses execution until promise settles

      async function consumePromiseFive() {
        try {
          // Wait for promiseFive to resolve
          const response = await promiseFive;

          // Access resolved data
          console.log(response);
          console.log(response.username);
          console.log(response.price);
        } catch (error) {
          // Handles rejected promise
          console.log("After 5 seconds this is error:", error);
        }
      }

      // Call the async function
      consumePromiseFive();


      // ==================================================
      // FETCH API using async / await
      // ==================================================
      // fetch() returns a promise
      // response.json() also returns a promise

      async function getAllUsers() {
        try {
          // Wait for API response
          const response = await fetch(
            "https://jsonplaceholder.typicode.com/users"
          );

          // Convert response into JavaScript object
          const data = await response.json();

          // Log users data
          console.log(data);
        } catch (error) {
          // Handle network or parsing errors
          console.log("Error:", error);
        }
      }

      // Call function
      getAllUsers();


      // ==================================================
      // FETCH API using .then() and .catch() (Promise style)
      // ==================================================
      fetch("https://jsonplaceholder.typicode.com/users")
        .then((response) => {
          // Convert response to JSON
          return response.json();
        })
        .then((data) => {
          // Handle received data
          console.log(data);
        })
        .catch((error) => {
          // Handle errors
          console.log(error);
        });

      // ==================================================
      // NOTE:
      // Promise.all() can run multiple promises in parallel
      // Good topic for further learning
      // ==================================================
    </script>
  </body>
</html>
