<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <title>Promises Practice</title>
</head>
<body>
    <h1>Promises Practice</h1>


    <script>
        // Example of a simple promise
        const myPromise = new Promise((resolve, reject) => {
            setTimeout(() => {
                const success = true; // Change to false to test rejection
                if (success) {
                    resolve("Promise resolved successfully after 2 seconds!");
                } else {
                    reject("Promise rejected.");
                }
            }, 2000);
        });

        myPromise
            .then(result => {
                console.log(result);
            })
            .catch(error => {
                console.error(error);
            });

            const fetchData = () => {
                return new Promise((resolve, reject) => {
                    setTimeout(() => {
                        const data = { id: 1, name: "John Doe" };
                        // resolve(data);
                        reject("Failed to fetch data, in build error>>."); // Uncomment to test rejection
                    }, 3000);
                });
            };

            fetchData()
                .then(data => {
                    console.log("Data fetched after 3 seconds:", data );
                    // console.log("Data ID:", data.id);
                    // console.log("Data Name:", data.name);
                    
                })
                .then( data => {
                    // console.log("This will run after the data is fetched.", data.id);
                })
                .catch(error => {
                    console.error("Error fetching data:", error);
                });


                // 🔥 IMPORTANT: If you want to use data in the next .then(), you must return it from the previous .then()!
                const fetchData2 = () => {
    return new Promise((resolve, reject) => {
        setTimeout(() => {

            const success = true; // change to false to test reject

            if (success) {
                const data = { id: 1, name: "John Doe" };
                resolve(data);
            } else {
                reject("Failed to fetch data.");
            }

        }, 2000);
    });
};

fetchData2()
    .then(data => {
        console.log("Data fetched after 3 seconds:", data);
        console.log("Data ID:", data.id);
        console.log("Data Name:", data.name);

        return data; // 🔥 IMPORTANT: return data for next .then()
    })
    .then(data => {
        console.log("This runs after first then.");
        console.log("Accessing again:", data.id);
        // return data; // 🔥 IMPORTANT: return data for next .then()
    })
    .then(data => {
    return data.name;
})
.then(name => {
    console.log("Only name:", name);
})

        console.error("Error fetching data:", error);
    });

                


    </script>
    
</body>
