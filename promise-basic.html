<!DOCTYPE html>
<html>
<head>
  <title>Promise Basic Example</title>
</head>
<body>

  <h2>Posts (Using .then)</h2>
  <button id="loadBtn">Load Posts</button>
  <div id="output"></div>

  <script>
    const button = document.getElementById("loadBtn");
    const output = document.getElementById("output");

    button.addEventListener("click", function () {

      // Fetch returns a Promise
      fetch("https://jsonplaceholder.typicode.com/posts?_limit=5")

        // Step 1: Convert response to JSON
        .then(function(response) {
          return response.json(); // also returns a Promise
        })

        // Step 2: Handle actual data
        .then(function(data) {
          output.innerHTML = "";

          data.forEach(function(post) {
            const div = document.createElement("div");
            div.innerHTML = `
              <h4>${post.title}</h4>
              <p>${post.body}</p>
              <hr/>
            `;
            output.appendChild(div);
          });
        })

        // Step 3: Catch errors
        .catch(function(error) {
          console.log("Error:", error);
          output.innerHTML = "<p>Something went wrong!</p>";
        });

    });
  </script>

</body>
</html>
