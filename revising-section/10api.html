<!--
FILE: api-practice.html

TOPIC: JavaScript API Integration Practice

What you will learn in this file:

1. What an API is
2. How to fetch data from an API
3. How to convert API response to JSON
4. How to display API data on a webpage
5. How JavaScript connects with HTML

Open this file in a browser to see it working.
-->

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>JavaScript API Practice</title>

<style>

/* Basic styling for the page */

body{
    font-family: Arial, sans-serif;
    background:#111;
    color:white;
    padding:40px;
}

h1{
    margin-bottom:20px;
}

/* Container where API data will appear */

#posts{
    margin-top:20px;
}

/* Card style for each API item */

.card{
    background:#1e1e1e;
    padding:20px;
    border-radius:10px;
    margin-bottom:15px;
    border:1px solid #333;
}

button{
    padding:10px 16px;
    border:none;
    border-radius:6px;
    background:#7c3aed;
    color:white;
    cursor:pointer;
}

button:hover{
    background:#6d28d9;
}

</style>
</head>

<body>

<h1>JavaScript API Integration Practice</h1>

<p>
Click the button below to fetch posts from an API.
</p>

<!-- Button that will trigger the API request -->
<button onclick="loadPosts()">Load Posts</button>

<!-- This div will hold the API data -->
<div id="posts"></div>


<script>

/*
================================================
WHAT IS AN API?
================================================

API = Application Programming Interface

It allows your application to communicate
with another service/server.

Example:

Website → sends request → API server
API server → sends data → Website

The data usually comes in JSON format.

*/


/*
================================================
API ENDPOINT
================================================

This is the API we will use:

https://jsonplaceholder.typicode.com/posts

It returns fake posts like this:

[
  {
    "userId":1,
    "id":1,
    "title":"post title",
    "body":"post content"
  }
]

*/


/*
================================================
MAIN FUNCTION
================================================

This function runs when user clicks the button.

Steps:
1. Send request to API
2. Receive response
3. Convert response to JSON
4. Display data on page

*/

async function loadPosts(){

    console.log("Fetching posts from API...");


    /*
    STEP 1
    Send request to API using fetch()

    fetch() is built-in JavaScript function
    used to call APIs
    */

    const response = await fetch("https://jsonplaceholder.typicode.com/posts");


    /*
    STEP 2
    Convert response to JSON

    API responses are usually JSON data
    */

    const data = await response.json();

    console.log(data);


    /*
    STEP 3
    Select HTML container where we show data
    */

    const container = document.getElementById("posts");


    /*
    Clear previous content if button clicked again
    */

    container.innerHTML = "";


    /*
    STEP 4
    Loop through API data

    We'll display first 5 posts
    */

    data.slice(0,5).forEach(post => {

        /*
        Create a new div element
        */

        const card = document.createElement("div");

        card.className = "card";


        /*
        Insert post data into the card
        */

        card.innerHTML = `
            <h3>${post.title}</h3>
            <p>${post.body}</p>
        `;


        /*
        Add card to page
        */

        container.appendChild(card);

    });

}


/*
================================================
FLOW OF THIS PROGRAM
================================================

User clicks button
        ↓
loadPosts() runs
        ↓
fetch() requests API
        ↓
API returns JSON data
        ↓
JavaScript converts JSON
        ↓
Loop through posts
        ↓
Create cards
        ↓
Display on webpage

*/

</script>

</body>
</html>
