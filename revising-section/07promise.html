<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Promise Practice</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #0f172a, #1e293b);
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }

    .card {
      background: #111827;
      padding: 30px;
      border-radius: 16px;
      width: 400px;
      text-align: center;
      box-shadow: 0 10px 30px rgba(0,0,0,0.4);
    }

    button {
      margin-top: 20px;
      padding: 12px 20px;
      border: none;
      border-radius: 8px;
      background: #facc15;
      color: black;
      font-weight: bold;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      transform: scale(1.05);
    }

    .loading {
      margin-top: 15px;
      font-size: 14px;
      color: #94a3b8;
    }

    .content {
      margin-top: 20px;
      font-size: 16px;
      line-height: 1.5;
    }
  </style>
</head>
<body>

  <div class="card">
    <h2>Promise Practice 🚀</h2>
    <p>Click the button to fetch data</p>

    <button id="fetchBtn">Get Data</button>

    <div class="loading" id="loading"></div>
    <div class="content" id="content"></div>
  </div>

<script>
    // Get button element from HTML using its ID
    const button = document.getElementById("fetchBtn");

    // This element will display the joke/advice
    const content = document.getElementById("content");

    // This element will show "Loading..." text
    const loading = document.getElementById("loading");

    // Variable to track how many times the button is clicked
    let clickCount = 0;


    // FUNCTION 1: Fetch a random joke from an API
    function fetchJoke() {

      // fetch() sends a request to the API and returns a Promise
      return fetch("https://official-joke-api.appspot.com/random_joke")

        // When the response comes, convert it to JSON
        .then(response => response.json())

        // Now we get the actual data from the API
        .then(data => {

          // Return formatted joke text
          return `${data.setup} 😂 <br><br> 👉 ${data.punchline}`;
        });
    }


    // FUNCTION 2: Fetch advice from another API
    function fetchAdvice() {

      // Send request to advice API
      return fetch("https://api.adviceslip.com/advice")

        // Convert response to JSON
        .then(response => response.json())

        // Extract advice text
        .then(data => {

          // Return formatted advice message
          return `💡 Advice: ${data.slip.advice}`;
        });
    }


    // Add click event listener to the button
    button.addEventListener("click", () => {

      // Increase click count each time button is pressed
      clickCount++;

      // Show loading message while fetching data
      loading.textContent = "Loading...";

      // Clear previous content
      content.innerHTML = "";

      // This variable will hold the promise (joke or advice)
      let promise;


      // Logic to decide which API to call
      if (clickCount === 1) {

        // First click → fetch joke
        promise = fetchJoke();

      } else if (clickCount === 2) {

        // Second click → fetch advice
        promise = fetchAdvice();

      } else {

        // After second click → reset counter
        clickCount = 1;

        // Fetch joke again
        promise = fetchJoke();
      }


      // Handle the Promise result
      promise

        // If API request succeeds
        .then(result => {

          // Remove loading text
          loading.textContent = "";

          // Display result (joke/advice)
          content.innerHTML = result;
        })

        // If something goes wrong
        .catch(error => {

          // Remove loading message
          loading.textContent = "";

          // Show error message to user
          content.innerHTML = "Something went wrong ❌";

          // Log error in browser console for debugging
          console.error(error);
        });
    });
</script>

</body>
</html>
