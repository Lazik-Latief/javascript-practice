<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Promise API Example</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f6f9;
      padding: 30px;
      text-align: center;
    }

    h1 {
      margin-bottom: 20px;
    }

    button {
      padding: 10px 20px;
      border: none;
      background: #4f46e5;
      color: white;
      border-radius: 8px;
      cursor: pointer;
      margin: 10px;
    }

    button:hover {
      background: #4338ca;
    }

    .container {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
      margin-top: 30px;
    }

    .card {
      background: white;
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
      text-align: left;
      transition: 0.3s ease;
    }

    .card:hover {
      transform: translateY(-5px);
    }

    .card h3 {
      margin: 0 0 10px 0;
    }

    .status {
      margin-top: 15px;
      font-weight: bold;
    }
  </style>
</head>
<body>

  <h1>Promise API Practice</h1>

  <button onclick="getUsers()">Get Users (GET)</button>
  <button onclick="sendUser()">Send User (POST)</button>

  <div class="status" id="status"></div>
  <div class="container" id="dataContainer"></div>

  <script>
    const container = document.getElementById("dataContainer");
    const status = document.getElementById("status");

    // GET Request using Promise
    function getUsers() {
      status.innerText = "Loading users...";
      container.innerHTML = "";

      fetch("https://jsonplaceholder.typicode.com/users")
        .then(response => response.json())
        .then(data => {
          status.innerText = "Users Loaded Successfully!";
          data.forEach(user => {
            const card = document.createElement("div");
            card.className = "card";
            card.innerHTML = `
              <h3>${user.name}</h3>
              <p><strong>Email:</strong> ${user.email}</p>
              <p><strong>City:</strong> ${user.address.city}</p>
              <p><strong>Company:</strong> ${user.company.name}</p>
            `;
            container.appendChild(card);
          });
        })
        .catch(error => {
          status.innerText = "Error loading users!";
          console.error(error);
        });
    }

    // POST Request using Promise
    function sendUser() {
      status.innerText = "Sending user data...";

      fetch("https://jsonplaceholder.typicode.com/users", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({
          name: "Lazik Latief",
          email: "lazik@example.com",
          city: "India"
        })
      })
        .then(response => response.json())
        .then(data => {
          status.innerText = "User Sent Successfully!";
          console.log("Response:", data);
          alert("User Created with ID: " + data.id);
        })
        .catch(error => {
          status.innerText = "Error sending user!";
          console.error(error);
        });
    }
  </script>

</body>
</html>
