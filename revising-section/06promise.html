<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Promise API Example</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f6f9;
      padding: 30px;
      text-align: center;
    }

    h1 {
      margin-bottom: 20px;
    }

    button {
      padding: 10px 20px;
      border: none;
      background: #4f46e5;
      color: white;
      border-radius: 8px;
      cursor: pointer;
      margin: 10px;
    }

    button:hover {
      background: #4338ca;
    }

    .container {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
      margin-top: 30px;
    }

    .card {
      background: white;
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
      text-align: left;
      transition: 0.3s ease;
    }

    .card:hover {
      transform: translateY(-5px);
    }

    .card h3 {
      margin: 0 0 10px 0;
    }

    .status {
      margin-top: 15px;
      font-weight: bold;
    }
  </style>
</head>
<body>

  <!-- Page title -->
  <h1>Promise API Practice</h1>

  <!-- Button to fetch users from API -->
  <button onclick="getUsers()">Get Users (GET)</button>

  <!-- Button to send new user to API -->
  <button onclick="sendUser()">Send User (POST)</button>

  <!-- Status message area (Loading, Success, Error) -->
  <div class="status" id="status"></div>

  <!-- Container where user cards will appear -->
  <div class="container" id="dataContainer"></div>


  <script>

    // Get reference to container where user data will be displayed
    const container = document.getElementById("dataContainer");

    // Get reference to status message area
    const status = document.getElementById("status");


    // ===============================
    // FUNCTION 1 : GET USERS FROM API
    // ===============================
    function getUsers() {

      // Show loading message
      status.innerText = "Loading users...";

      // Clear previous user data
      container.innerHTML = "";

      // Send GET request to API
      fetch("https://jsonplaceholder.typicode.com/users")

        // Convert response into JSON format
        .then(response => response.json())

        // When data arrives from API
        .then(data => {

          // Update status message
          status.innerText = "Users Loaded Successfully!";

          // Loop through each user in the API response
          data.forEach(user => {

            // Create a new div element (card)
            const card = document.createElement("div");

            // Add CSS class to the card
            card.className = "card";

            // Insert user data into the card
            card.innerHTML = `
              <h3>${user.name}</h3>
              <p><strong>Email:</strong> ${user.email}</p>
              <p><strong>City:</strong> ${user.address.city}</p>
              <p><strong>Company:</strong> ${user.company.name}</p>
            `;

            // Add the card to the container in the webpage
            container.appendChild(card);
          });
        })

        // If API request fails
        .catch(error => {

          // Show error message
          status.innerText = "Error loading users!";

          // Print error in browser console
          console.error(error);
        });
    }



    // ==================================
    // FUNCTION 2 : SEND USER DATA (POST)
    // ==================================
    function sendUser() {

      // Show sending message
      status.innerText = "Sending user data...";

      // Send POST request to API
      fetch("https://jsonplaceholder.typicode.com/users", {

        // HTTP method
        method: "POST",

        // Headers tell server the data format
        headers: {
          "Content-Type": "application/json"
        },

        // Convert JavaScript object into JSON string
        body: JSON.stringify({

          // User data we want to send
          name: "Lazik Latief",
          email: "lazik@example.com",
          city: "India"
        })
      })

        // Convert response to JSON
        .then(response => response.json())

        // When server responds
        .then(data => {

          // Update status message
          status.innerText = "User Sent Successfully!";

          // Print response in console
          console.log("Response:", data);

          // Show alert with returned user ID
          alert("User Created with ID: " + data.id);
        })

        // If request fails
        .catch(error => {

          // Show error message
          status.innerText = "Error sending user!";

          // Print error in console
          console.error(error);
        });
    }

  </script>

</body>
</html>
